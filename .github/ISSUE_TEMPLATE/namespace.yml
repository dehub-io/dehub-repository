name: 命名空间申请
description: 申请创建新的命名空间
labels: ["namespace-request"]
body:
  - type: markdown
    attributes:
      value: |
        感谢申请命名空间！请填写以下信息。
        
        **命名规则**：
        - 小写字母、数字、连字符
        - 以字母开头
        - 长度 2-30 个字符
        
        **审核时间**：通常 1-3 个工作日
        
  - type: input
    id: namespace
    attributes:
      label: 命名空间名称
      description: 小写字母、数字、连字符，如 myproject
      placeholder: "myproject"
    validations:
      required: true
      
  - type: input
    id: owner
    attributes:
      label: 命名空间所有者
      description: GitHub 用户名（将作为命名空间 owner）
      placeholder: "your-username"
    validations:
      required: true
      
  - type: textarea
    id: description
    attributes:
      label: 用途说明
      description: 简述命名空间用途和计划发布的包
      placeholder: "用于发布 XXX 项目的官方包，包括 core、utils 等"
    validations:
      required: true
      
  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我确认该命名空间未被占用
          required: true
        - label: 我理解命名空间一旦创建不可删除
          required: true
        - label: 我同意遵守 dehub 社区准则
          required: true
