name: Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (e.g., zyrthi/hello)'
        required: true
      version:
        description: 'Version (e.g., 1.0.0)'
        required: true
      archive_url:
        description: 'Archive URL (optional, for external packages)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dehub
        run: |
          go install github.com/dehub-io/dehub-cli@latest

      - name: Download package (if external URL)
        if: ${{ inputs.archive_url != '' }}
        run: |
          curl -L -o package.tar.gz "${{ inputs.archive_url }}"
          sha256sum package.tar.gz > sha256

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.package }}/${{ inputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --repo "${{ github.repository }}" \
            package.tar.gz sha256 || echo "Release may already exist"

      - name: Update index
        run: |
          # Update global index
          if ! grep -q '"${{ inputs.package }}"' index.json; then
            sed -i 's/"packages": \[/"packages": [\n    "${{ inputs.package }}",/' index.json
          fi
          
          # Update package index
          mkdir -p "packages/${{ inputs.package }}"
          cat > "packages/${{ inputs.package }}/index.json" << INDEX
          {
            "schema_version": "1.0",
            "package": "${{ inputs.package }}",
            "versions": [
              {
                "version": "${{ inputs.version }}",
                "archive_url": "https://github.com/${{ github.repository }}/releases/download/${{ inputs.package }}/${{ inputs.version }}/package.tar.gz",
                "sha256_url": "https://github.com/${{ github.repository }}/releases/download/${{ inputs.package }}/${{ inputs.version }}/sha256",
                "release_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              }
            ]
          }
          INDEX

      - name: Commit index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json "packages/${{ inputs.package }}/index.json"
          git commit -m "chore: update index for ${{ inputs.package }}@${{ inputs.version }}" || echo "No changes"
          git push
