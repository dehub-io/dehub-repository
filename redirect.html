<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dehub OAuth Redirect</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error { color: #ff6b6b; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Dehub Authentication</h2>
        <div class="spinner"></div>
        <p id="status">Processing authorization...</p>
        <p id="error" class="error"></p>
    </div>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            
            if (!code || !state) {
                document.getElementById('status').textContent = 'Authorization completed!';
                document.getElementById('error').textContent = 'You can close this window and return to the terminal.';
                return;
            }
            
            try {
                // state 包含本地回调地址
                const callbackUrl = decodeURIComponent(state);
                
                // 构建回调 URL
                const callback = new URL(callbackUrl);
                callback.searchParams.set('code', code);
                
                document.getElementById('status').textContent = 'Redirecting to local application...';
                
                // 重定向到本地
                window.location.href = callback.toString();
            } catch (e) {
                document.getElementById('status').textContent = 'Error';
                document.getElementById('error').textContent = 'Invalid state parameter: ' + e.message;
            }
        })();
    </script>
</body>
</html>
